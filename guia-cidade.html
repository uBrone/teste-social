        }

        }

        }

        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;

            }
        }

                                        <div className={`w-16 h-16 rounded-[1.25rem] flex items-center justify-center ${cat.color} group-hover:shadow-md transition-shadow`}>
                                            <Icon name={cat.icon} className="w-7 h-7" />
                                        </div>
                                        <span className="text-xs font-semibold text-slate-600 text-center">{cat.name}</span>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Featured Stores */}
                        <div className="mt-10">
                            <div className="px-5 flex items-end justify-between mb-4">
                                <h2 className="text-lg font-bold text-slate-800 tracking-tight">Em Destaque</h2>
                            </div>
                            <div className="flex gap-4 overflow-x-auto px-5 pb-4 hide-scrollbar">
                                {featuredStores.map(store => {
                                    const cat = CATEGORIES.find(c => c.id === store.categoryId);
                                    return (
                                        <div key={store.id} onClick={() => openStore(store.id)} className="min-w-[260px] bg-white rounded-3xl p-3 shadow-sm border border-slate-100 cursor-pointer active:scale-[0.98] transition-transform">
                                            <div className="relative h-32 rounded-2xl overflow-hidden mb-3 isolate bg-slate-100">
                                                <img src={store.cover} className="w-full h-full object-cover" />
                                                <div className="absolute top-2 left-2 bg-white/90 backdrop-blur text-[10px] font-black px-2 py-1 rounded-lg text-slate-700 shadow-sm">{cat.name}</div>
                                            </div>
                                            <div className="px-2">
                                                <h3 className="font-bold text-slate-800 truncate mb-1">{store.name}</h3>
                                                <div className="flex items-center justify-between text-xs">
                                                    <span className="flex items-center gap-1 text-amber-500 font-bold"><Icon name="star" className="w-3 h-3" strokeWidth="3" /> {store.rating}</span>
                                                    {store.isOpen
                                                        ? <span className="text-emerald-500 font-bold flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> Aberto</span>
                                                        : <span className="text-slate-400 font-bold flex items-center gap-1">Fechado</span>
                                                    }
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Recent Stores */}
                        <div className="px-5 mt-6">
                            <h2 className="text-lg font-bold text-slate-800 mb-4 tracking-tight">Novos no Guia</h2>
                            <div className="flex flex-col gap-3">
                                {recentStores.map(store => (
                                    <div key={store.id} onClick={() => openStore(store.id)} className="bg-white rounded-2xl p-3 flex items-center gap-4 shadow-sm border border-slate-100 cursor-pointer active:bg-slate-50 transition-colors">
                                        <div className="w-14 h-14 rounded-xl overflow-hidden shrink-0 border border-slate-100">
                                            <img src={store.logo} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="flex-1">
                                            <h3 className="font-bold text-sm text-slate-800 line-clamp-1">{store.name}</h3>
                                            <p className="text-xs text-slate-500 line-clamp-1 mt-0.5">{store.desc}</p>
                                        </div>
                                        <div className="flex items-center gap-1 text-amber-500 font-bold text-xs bg-amber-50 px-2 py-1 rounded-lg shrink-0">
                                            <Icon name="star" className="w-3 h-3" /> {store.rating}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                );
            };

            // ------------------------------------------
            // RENDER: CATEGORY LIST
            // ------------------------------------------
            const renderCategory = () => {
                if (!selectedCategory) return null;
                const catStores = STORES.filter(s => s.categoryId === selectedCategory.id).sort((a, b) => b.rating - a.rating);

                return (
                    <main className="min-h-screen bg-slate-50 relative pb-20 animate-fade-in">
                        <header className="glass-nav sticky top-0 z-40 px-5 pt-6 pb-4 border-b border-slate-200">
                            <button onClick={() => goTo('home')} className="w-10 h-10 bg-white shadow-sm rounded-full flex items-center justify-center text-slate-600 mb-4 active:scale-90 transition-transform"><Icon name="arrowLeft" /></button>
                            <div className="flex items-center gap-3">
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${selectedCategory.color} shadow-sm`}>
                                    <Icon name={selectedCategory.icon} className="w-6 h-6" />
                                </div>
                                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">{selectedCategory.name}</h1>
                            </div>
                        </header>

                        <div className="px-5 pt-6">
                            <p className="text-sm font-bold text-slate-500 mb-4">{catStores.length} estabelecimento(s) encontrado(s)</p>
                            <div className="flex flex-col gap-4">
                                {catStores.map(store => (
                                    <div key={store.id} onClick={() => openStore(store.id)} className="bg-white rounded-[1.5rem] p-4 shadow-sm border border-slate-100 flex gap-4 cursor-pointer active:scale-[0.98] transition-transform">
                                        <div className="relative w-20 h-20 rounded-2xl overflow-hidden shrink-0 border border-slate-100 isolate">
                                            <img src={store.logo} className="w-full h-full object-cover" />
                                            {store.isOpen && <div className="absolute bottom-0 left-0 right-0 bg-emerald-500 text-white text-[8px] font-black uppercase text-center py-0.5">Aberto</div>}
                                            {!store.isOpen && <div className="absolute bottom-0 left-0 right-0 bg-slate-500 text-white text-[8px] font-black uppercase text-center py-0.5">Fechado</div>}
                                        </div>
                                        <div className="flex-1 flex flex-col justify-center">
                                            <h3 className="font-extrabold text-slate-800 text-lg leading-tight mb-1">{store.name}</h3>
                                            <div className="flex items-center gap-2 text-xs font-medium text-slate-500 mb-2">
                                                <span className="flex items-center gap-1 text-amber-500 font-bold"><Icon name="star" className="w-3 h-3" /> {store.rating}</span>
                                                <span className="w-1 h-1 rounded-full bg-slate-300"></span>
                                                <span className="truncate">{store.address}</span>
                                            </div>
                                            <p className="text-[11px] text-slate-400 line-clamp-1">{store.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                );
            };

            // ------------------------------------------
            // RENDER: SEARCH HYBRID
            // ------------------------------------------
            const renderSearch = () => {
                const term = searchQuery.toLowerCase();
                const matchedStores = STORES.filter(s => s.name.toLowerCase().includes(term) || s.desc.toLowerCase().includes(term));
                const matchedProducts = PRODUCTS.filter(p => p.name.toLowerCase().includes(term) || p.desc.toLowerCase().includes(term));

                return (
                    <main className="min-h-screen bg-white pb-20 animate-fade-in relative">
                        <header className="sticky top-0 z-40 bg-white px-5 pt-6 pb-2 shadow-sm border-b border-slate-100">
                            <div className="flex items-center gap-3 mb-4">
                                <button onClick={() => goTo('home')} className="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-600 active:scale-90 transition-transform shrink-0"><Icon name="arrowLeft" /></button>
                                <div className="relative flex-1">
                                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" className="w-4 h-4" /></div>
                                    <input
                                        type="text"
                                        className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 outline-none font-medium text-sm focus:border-indigo-400 focus:bg-white transition-colors"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        autoFocus
                                    />
                                    {searchQuery && <button onClick={() => setSearchQuery('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs p-1">✕</button>}
                                </div>
                            </div>

                            <div className="flex gap-6 mt-2 relative">
                                <button
                                    onClick={() => setSearchTab('stores')}
                                    className={`pb-3 text-sm font-bold transition-colors ${searchTab === 'stores' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-500'}`}
                                >
                                    Lojas ({matchedStores.length})
                                </button>
                                <button
                                    onClick={() => setSearchTab('products')}
                                    className={`pb-3 text-sm font-bold transition-colors ${searchTab === 'products' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-500'}`}
                                >
                                    Produtos ({matchedProducts.length})
                                </button>
                            </div>
                        </header>

                        <div className="px-5 pt-6 bg-slate-50 min-h-screen">
                            {searchTab === 'stores' && (
                                <div className="flex flex-col gap-4">
                                    {matchedStores.length === 0 ? <p className="text-slate-400 text-center mt-10">Nenhuma loja encontrada.</p> : null}
                                    {matchedStores.map(store => (
                                        <div key={store.id} onClick={() => openStore(store.id)} className="bg-white rounded-[1.5rem] p-4 shadow-sm border border-slate-100 flex gap-4 cursor-pointer">
                                            <div className="w-16 h-16 rounded-2xl overflow-hidden shrink-0 border border-slate-100">
                                                <img src={store.logo} className="w-full h-full object-cover" />
                                            </div>
                                            <div className="flex-1 flex flex-col justify-center">
                                                <h3 className="font-extrabold text-slate-800 mb-1">{store.name}</h3>
                                                <div className="flex items-center gap-2 text-xs font-medium text-slate-500">
                                                    <span className="text-amber-500 font-bold"><Icon name="star" className="w-3 h-3 inline pb-0.5" /> {store.rating}</span>
                                                    <span className="w-1 h-1 rounded-full bg-slate-300"></span>
                                                    <span>{store.isOpen ? <span className="text-emerald-500 font-bold">Aberto</span> : 'Fechado'}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {searchTab === 'products' && (
                                <div className="flex flex-col gap-4">
                                    {matchedProducts.length === 0 ? <p className="text-slate-400 text-center mt-10">Nenhum produto encontrado.</p> : null}
                                    {matchedProducts.map(prod => {
                                        const store = STORES.find(s => s.id === prod.storeId);
                                        return (
                                            <div key={prod.id} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex gap-4">
                                                <div className="w-20 h-20 rounded-xl overflow-hidden shrink-0 bg-slate-50 isolate">
                                                    <img src={prod.image} className="w-full h-full object-cover" />
                                                </div>
                                                <div className="flex-1 flex flex-col justify-between py-1">
                                                    <div>
                                                        <h4 className="font-bold text-slate-800 text-sm leading-tight line-clamp-2">{prod.name}</h4>
                                                        <div className="text-[10px] items-center text-slate-500 mt-1 cursor-pointer hover:text-indigo-500 transition-colors" onClick={() => openStore(store.id)}>
                                                            Vendido por <span className="font-bold underline">{store.name}</span>
                                                        </div>
                                                    </div>
                                                    <div className="text-lg font-black text-indigo-600">R$ {prod.price.toFixed(2).replace('.', ',')}</div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </main>
                );
            };

            // ------------------------------------------
            // RENDER: STORE PROFILE (PWA CORE)
            // ------------------------------------------
            const renderStore = () => {
                if (!selectedStore) return null;
                const storeProducts = PRODUCTS.filter(p => p.storeId === selectedStore.id);
                const storeReviews = REVIEWS.filter(r => r.storeId === selectedStore.id);
                const cat = CATEGORIES.find(c => c.id === selectedStore.categoryId);

                return (
                    <main className="min-h-screen bg-slate-50 pb-24 animate-fade-in">
                        {/* Action Nav Overlay */}
                        <div className="fixed top-0 left-0 right-0 z-50 p-5 flex justify-between items-center pointer-events-none">
                            <button onClick={() => goTo('home')} className="w-10 h-10 bg-white/30 backdrop-blur-md rounded-full shadow-lg flex items-center justify-center text-white pointer-events-auto active:scale-90 transition-transform">
                                <Icon name="arrowLeft" />
                            </button>
                        </div>

                        {/* Cinematic Cover */}
                        <div className="h-64 relative isolate bg-slate-900 border-b border-white/10">
                            <img src={selectedStore.cover} className="absolute inset-0 w-full h-full object-cover opacity-60" />
                            <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/40 to-transparent"></div>
                        </div>

                        <div className="relative px-5 pb-6 -mt-16 z-10 border-b border-slate-200 bg-white rounded-t-3xl pt-16">
                            {/* Floating Logo */}
                            <div className="absolute -top-12 left-5 w-24 h-24 bg-white rounded-[2rem] p-1 shadow-xl border border-slate-100">
                                <div className="w-full h-full rounded-[1.75rem] overflow-hidden bg-slate-50">
                                    <img src={selectedStore.logo} className="w-full h-full object-cover" />
                                </div>
                            </div>

                            {/* Badges Right */}
                            <div className="absolute top-4 right-5 text-right">
                                <div className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-black shadow-sm ${selectedStore.isOpen ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                                    {selectedStore.isOpen ? <><span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Aberto Agora</> : 'Fechado'}
                                </div>
                            </div>

                            <div className="mt-2">
                                <div className="text-xs font-bold text-indigo-500 mb-1 tracking-widest uppercase">{cat.name}</div>
                                <h1 className="text-3xl font-black text-slate-900 leading-tight mb-2 tracking-tight">{selectedStore.name}</h1>
                                <p className="text-sm text-slate-500 mb-4 font-medium leading-relaxed">{selectedStore.desc}</p>

                                <div className="flex flex-wrap items-center gap-4 text-sm font-medium text-slate-600 mb-6 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <div className="flex items-center gap-1.5 text-amber-500 font-extrabold"><Icon name="star" className="w-4 h-4" /> {selectedStore.rating}</div>
                                    <div className="w-1 h-1 bg-slate-300 rounded-full"></div>
                                    <div className="flex items-center gap-1.5 text-slate-500"><Icon name="mapPin" className="w-4 h-4 text-slate-400" /> {selectedStore.address}</div>
                                </div>

                                {/* MASSIVE WHATSAPP CTA */}
                                <a
                                    href={`https://wa.me/${selectedStore.whatsapp}`}
                                    target="_blank"
                                    rel="noreferrer"
                                    className="w-full bg-[#25D366] hover:bg-[#1EBE5A] text-white py-4 rounded-2xl font-extrabold text-lg shadow-lg shadow-green-500/30 flex items-center justify-center gap-3 transition-colors active:scale-[0.98]"
                                >
                                    <span className="w-6 h-6"><Icon name="whatsapp" /></span>
                                    Chamar no WhatsApp
                                </a>
                            </div>
                        </div>

                        {/* Store Tabs */}
                        <div className="sticky top-0 z-30 bg-white border-b border-slate-200 px-5 flex gap-6 pt-4">
                            <button
                                onClick={() => setStoreTab('catalogo')}
                                className={`pb-4 text-sm font-bold transition-colors relative ${storeTab === 'catalogo' ? 'text-indigo-600' : 'text-slate-500'}`}
                            >
                                Catálogo
                                {storeTab === 'catalogo' && <div className="absolute bottom-0 left-0 right-0 h-1bg-indigo-600 rounded-t-full"></div>}
                                {storeTab === 'catalogo' && <div className="absolute bottom-0 left-0 right-0 h-1 bg-indigo-600 rounded-t-full"></div>}
                            </button>
                            <button
                                onClick={() => setStoreTab('reviews')}
                                className={`pb-4 text-sm font-bold transition-colors relative ${storeTab === 'reviews' ? 'text-indigo-600' : 'text-slate-500'}`}
                            >
                                Avaliações ({storeReviews.length})
                                {storeTab === 'reviews' && <div className="absolute bottom-0 left-0 right-0 h-1 bg-indigo-600 rounded-t-full"></div>}
                            </button>
                        </div>

                        {/* Store Tab Content */}
                        <div className="px-5 pt-6 relative min-h-[300px]">
                            {storeTab === 'catalogo' && (
                                <div className="flex flex-col gap-5 animate-fade-in">
                                    {storeProducts.length === 0 ? <p className="text-slate-400 text-center mt-10 font-medium">Nenhum produto cadastrado.</p> : null}
                                    {storeProducts.map(prod => (
                                        <div key={prod.id} className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 flex gap-4 active:bg-slate-50 transition-colors cursor-pointer">
                                            <div className="flex-1 flex flex-col pt-1">
                                                <h4 className="font-extrabold text-slate-800 text-base leading-tight mb-1 pr-2">{prod.name}</h4>
                                                <p className="text-xs text-slate-500 line-clamp-2 leading-relaxed mb-3 pr-4">{prod.desc}</p>
                                                <div className="mt-auto text-lg font-black text-indigo-600">R$ {prod.price.toFixed(2).replace('.', ',')}</div>
                                            </div>
                                            <div className="w-28 h-28 rounded-2xl overflow-hidden shrink-0 bg-slate-50 shadow-inner isolate border border-slate-100">
                                                <img src={prod.image} className="w-full h-full object-cover" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {storeTab === 'reviews' && (
                                <div className="flex flex-col gap-5 animate-fade-in">
                                    <div className="bg-indigo-50 border border-indigo-100 rounded-3xl p-6 text-center shadow-sm">
                                        <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center text-amber-500 mx-auto mb-3 shadow-md">
                                            <Icon name="star" className="w-8 h-8" />
                                        </div>
                                        <h3 className="font-extrabold text-slate-800 text-xl mb-1">{selectedStore.rating} de 5</h3>
                                        <p className="text-xs text-slate-500 font-medium mb-4">Baseado em {storeReviews.length} avaliações</p>
                                        <button
                                            onClick={() => requireAuth(() => alert('Logado! Abrir tela de rating.'))}
                                            className="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-transform"
                                        >
                                            Escrever uma Avaliação
                                        </button>
                                    </div>

                                    <div className="flex flex-col gap-4 mt-2">
                                        {storeReviews.map(rev => (
                                            <div key={rev.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="font-bold text-slate-800">{rev.user}</span>
                                                    <span className="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-lg">{rev.date}</span>
                                                </div>
                                                <div className="flex text-amber-500 gap-0.5 mb-3">
                                                    {[...Array(5)].map((_, i) => (
                                                        <Icon key={i} name="star" className={`w-3.5 h-3.5 ${i < rev.rating ? 'text-amber-500' : 'text-slate-200'}`} />
                                                    ))}
                                                </div>
                                                <p className="text-sm text-slate-600 leading-relaxed font-medium">{rev.text}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                );
            };

            // ------------------------------------------
            // RENDER: AUTH MODAL
            // ------------------------------------------
            const renderAuthModal = () => {
                if (!showAuthModal) return null;
                return (
                    <div className="fixed inset-0 z-[100] flex justify-center items-end bg-slate-900/40 backdrop-blur-sm animate-fade-in">
                        <div className="w-full max-w-md bg-white rounded-t-[3rem] p-8 shadow-2xl animate-slide-up pb-12">
                            <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>

                            <h2 className="text-2xl font-black text-slate-900 mb-2">Faça Login</h2>
                            <p className="text-slate-500 text-sm font-medium mb-8">Para avaliar estabelecimentos, precisamos saber quem você é.</p>

                            <form onSubmit={(e) => { e.preventDefault(); setIsLogged(true); setShowAuthModal(false); }} className="flex flex-col gap-4">
                                <input required type="text" placeholder="Seu nome" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-medium focus:border-indigo-500 focus:ring-4 ring-indigo-500/20 outline-none transition-all" />
                                <input required type="email" placeholder="E-mail" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-medium focus:border-indigo-500 focus:ring-4 ring-indigo-500/20 outline-none transition-all" />
                                <input required type="password" placeholder="Senha" className="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-medium focus:border-indigo-500 focus:ring-4 ring-indigo-500/20 outline-none transition-all" />

                                <div className="flex gap-4 mt-4">
                                    <button type="button" onClick={() => setShowAuthModal(false)} className="flex-1 font-bold text-slate-500 py-4 bg-slate-100 rounded-2xl active:bg-slate-200 transition-colors">Voltar</button>
                                    <button type="submit" className="flex-1 font-black text-white bg-indigo-600 py-4 rounded-2xl shadow-lg shadow-indigo-600/30 active:bg-indigo-700 transition-colors">Entrar</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="relative font-sans antialiased">
                    {view === 'home' && renderHome()}
                    {view === 'category' && renderCategory()}
                    {view === 'search' && renderSearch()}
                    {view === 'store' && renderStore()}

                    {renderAuthModal()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
